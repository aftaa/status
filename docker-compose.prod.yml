services:
    nginx:
        image: nginx:1.29.8
        ports:
            - "80:80"
        volumes:
            - ./docker/nginx/hosts:/etc/nginx/conf.d
        restart: always
        depends_on:
            - php
        networks:
            - app
        healthcheck:
            test: ["CMD", "nginx", "-t"]
            timeout: 10s
            retries: 3
            start_period: 5s

    mysql:
        image: mysql:9.7.0
        volumes:
            - mysql_data:/var/lib/mysql
        environment:
            MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
            MYSQL_DATABASE: ${MYSQL_DATABASE}
            MYSQL_USER: ${MYSQL_USER}
            MYSQL_PASSWORD: ${MYSQL_PASSWORD}
        restart: always
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
            timeout: 10s
            retries: 5
            start_period: 30s
        networks:
            - data

    redis:
        image: redis:8.6-alpine3.23
        restart: always
        volumes:
            - redis_data:/data
        command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
        healthcheck:
            test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
            timeout: 10s
            retries: 5
            start_period: 5s
        networks:
            - data

    mongodb:
        image: mongo:8
        restart: always
        volumes:
            - mongo_data:/data/db
        environment:
            MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
            MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
        healthcheck:
            test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
            timeout: 10s
            retries: 5
            start_period: 10s
        networks:
            - data

    php:
        build:
            context: .
            dockerfile: ./docker/php/Dockerfile
            target: production
        restart: always
        depends_on:
            mysql:
                condition: service_healthy
            redis:
                condition: service_healthy
            mongodb:
                condition: service_healthy
        healthcheck:
            test: ["CMD", "php-fpm", "-t"]
            timeout: 10s
            retries: 3
            start_period: 5s
        networks:
            - app
            - data

networks:
    app:
        driver: bridge
    data:
        driver: bridge
        internal: true

volumes:
    mysql_data:
    redis_data:
    mongo_data:
