server {
    listen 80;
    server_name localhost;

    # КРИТИЧНО ДЛЯ ПРОДА: Nginx должен смотреть в папку public внутри контейнера!
    root /var/www/test3/public;

    location / {
        # Пытаемся найти реальный файл, если нет — перенаправляем на фронт-контроллер Symfony
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index.php(/|$) {
        # Перенаправляем обработку PHP в контейнер с php-fpm
        fastcgi_pass php:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;

        # Передаем правильный путь к скрипту внутри контейнера php
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $document_root;

        internal;
    }

    location ~ \.php$ {
        return 404;
    }
}
